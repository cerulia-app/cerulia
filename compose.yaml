services:
  postgres:
    image: postgres:18-alpine
    profiles:
      - local-db
    environment:
      POSTGRES_DB: cerulia
      POSTGRES_USER: cerulia
      POSTGRES_PASSWORD: cerulia
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U cerulia -d cerulia
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
